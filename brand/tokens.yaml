# ============================================================
# SOA Deck Studio — brand design tokens
# THE single source of brand truth. Every renderer reads from
# this file; nothing in a deck spec may override it.
#
# Values extracted 2026-07 from the official SOA PowerPoint
# template (2026.06.02__SOA_PPT_Template.pptx): theme1.xml
# color scheme + font scheme, logo assets from ppt/media.
# ============================================================

colors:
  primary: "#0E2841"        # SOA dark navy (theme dk2) — dark slide backgrounds, headings
  accent: "#0051B8"         # SOA bright blue (theme accent2 / logo shield) — titles, emphasis
  accent_warm: "#51C8FF"    # SOA sky blue (theme accent4 / shield-on-dark) — accents on navy, highlights
  positive: "#2E7D32"       # good deltas (functional, not in SOA theme — chosen for legibility)
  negative: "#FF383C"       # bad deltas (SOA theme accent6 red)
  neutral_dark: "#0E2841"   # body text — SOA navy
  neutral_mid: "#64748B"    # captions, footers, muted labels
  neutral_light: "#F0F3F7"  # panel/tile backgrounds (light blue-gray tint)
  accent_tint: "#DDF1FF"    # pale sky — highlighted table cells, soft emphasis
  warning: "#E9A13B"        # amber — 'watch' status
  border: "#DCE3EB"         # hairline card borders
  highlight: "#FFD61A"      # SOA yellow — THE 'look here' color for data points
  white: "#FFFFFF"
  # Chart series colors, applied in order. First = hero series.
  # SOA theme accents: bright blue, sky, navy, periwinkle, lime, deep blue.
  chart_series: ["#0051B8", "#51C8FF", "#0E2841", "#8F88F8", "#B3CE36", "#092369"]

fonts:
  # Exactly as named in the SOA theme (Microsoft cloud font family).
  # PowerPoint substitutes the fallback silently if Tenorite is missing;
  # `deckstudio doctor` warns when that will happen.
  heading:
    name: "Tenorite Bold"
    fallback: "Segoe UI"
  body:
    name: "Tenorite Regular"
    fallback: "Calibri"

# Point sizes. Floor is 14pt except footnote-class text (caption, footer).
type_scale:
  slide_title: 28
  section_title: 40
  subtitle: 18
  kicker: 14
  body: 16
  bullet_sub: 14
  big_number: 60
  stat_label: 14
  stat_delta: 14
  caption: 12     # footnote class: chart sources, target context lines
  footer: 10      # footnote class: slide footer & page number
  quote: 26
  table_header: 14
  table_body: 14

layout:
  slide_size: widescreen_16x9   # matches the SOA template (12192000 x 6858000 EMU)
  margin_in: 0.6
  gutter_in: 0.25
  title_top_in: 0.45
  content_top_in: 1.5

charts:
  gridlines: minimal            # value-axis only, light color
  data_labels: auto             # outside_end where the chart kind allows
  legend: bottom_when_multi     # legend only when >1 series
  font_size: 12

logo:
  # SOA convention (from the official template): logo sits BOTTOM-LEFT,
  # page number bottom-right.
  default: assets/logos/logo_primary.png   # full-color shield + wordmark (white bg)
  dark_bg: assets/logos/shield_sky.png     # sky-blue shield mark (navy bg)

footer:
  # Default footer if the deck spec doesn't set one.
  text: "Society of Actuaries"
  show_page_numbers: true
