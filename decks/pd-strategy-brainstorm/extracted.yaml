  title: Impact to Products
  bullets:
  - (no text found on this slide)
- id: slide-17
  type: content
  title: Impact on current (or future) products
  bullets:
  - '17'
  - 'Goal: Identify how the strategy changes what we keep, change, or retire.'
  - Which current products clearly align with the guiding policy? Which don’t?
  - 'For each major PD format (in-person conferences, virtual conferences, webinars, PD Edge individual
    & corporate):'
  - Does the new strategy increase or decrease its role in the portfolio?
  - What changes are needed to pricing, packaging, or delivery?
  - How will it be marketed differently under the new policy?
  - Which products should be retired because they no longer fit the strategy or can’t meet margin 
    targets?
  - How will coherent actions (e.g., shifting mid-tier topics to virtual) directly change the format
    or audience of existing events?
  - Are there current products that could be repurposed to feed PD Edge or serve new segments?
  - 'Goal: Spot opportunities and risks for offerings we don’t yet sell.'
  - What new products or formats naturally emerge from the guiding policy?
  - (e.g., AI-matched cohort virtual events, micro-credentials, employer academies, regional virtual
    summits)
  - Which market segments are currently underserved that we could address (small firms, Tier 2/3 
    countries, mid-career actuaries)?
  - How could PD Edge be expanded or tiered to serve different needs and price sensitivities?
  - Which employer problems could SOA solve with new PD offerings that competitors can’t easily 
    copy?
  - What new products might cannibalize existing offerings - and are we okay with that if margin and
    reach improve?
