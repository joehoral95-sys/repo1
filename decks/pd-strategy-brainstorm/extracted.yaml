- id: slide-7
  type: content
  title: 'Diagnosis: Ask “What’s Happening?” in an attempt to understand the nature of challenges you
    face'
  bullets:
  - '7'
  - 'Goal: Agree on the single most critical challenge PD must solve over the next 5 years.'
  - What is the biggest obstacle holding PD back from doubling revenue and relevance?
  - Which issues are symptoms vs. the root problem?
  - Where is PD most vulnerable today (financially, competitively, operationally)?
  - What evidence supports this diagnosis (data, research, trends)?
  - If we had to name one problem only, what would it be?
- id: slide-8
  type: content
  title: 'Diagnosis: Ask “What’s Happening?” in an attempt to understand the nature of challenges you
    face'
  bullets:
  - Concern around broader potential business trends – actuarial profession more boardly, exams. 
    Fewer actuaries = less PD
  - '8'
  - Competition, other content available, different landscape (in-person vs. Virtual offerings); 
    competency-based learning; not understanding/not understanding audience; internally – not having
    a clear direction, goals;
  - Reactionary approach; cross-functional misalignment;
  - Downward trend in registrations for certificates
  - Ways to attract a larger number of international participants
  - Getting into international markets- connecting with employers and local organizations
  - Speed of updating existing content and developing new content
  - Market research shows that participants want our products to add value
  - In-person vs virtual delivery competition within ourselves
  - Employer offered content/reduced support to attend virtual or inperson
  - Fluctuating attendance/future contracting challenges
  - Changing internal direction – clear direction isn't always so clear
  - Virtual Attendance is down in addition to inperson.
  - International PD – does this fit within the International team or should it live within PD?
  - 'Locations: save money or have larger attendance with larger expenses'
  - Confusion on target audiences for programs. Awareness issues.
  - Segmentation strategy isn’t clear (PD pricing, bundling, and marketing have been built over time
    vs being optimized by employer size, geotraphy, or learner profile.
  - Relatedly, Product-Market fit in virtual PD, and competition.
  - International underpenetration?
  - International events are small scale. Profitability is questionable.
  - PD awareness may be lower
  - Desire for live content, but time zones/language/local content are limitations.
  - We offer a lot of content on everything across our portfolio. We are not recognized as the 
    leader or the best in any area
  - Tara – are sections and the change away from section revenue limiting our content development?
  - Same speakers present at the same events each year – need fresh ideas/ content . Not viewed as 
    an honor to present at a program.
  - Revenue concentration/ vulnerability?
  - Conflicting strategies – everything in PDE, some things a la carte
  - Lack of support from employers – offering internal education, not sending employees to events, 
    etc.
  - We don't know what content people actually want.
  notes: "Goal: Agree on the single most critical challenge PD must solve over the next 5 years.\nWhat
    is the biggest obstacle holding PD back from doubling revenue and relevance?\nWhich issues are symptoms
    vs. the root problem?\nWhere is PD most vulnerable today (financially, competitively, operationally)?\n\
    What evidence supports this diagnosis (data, research, trends)?\nIf we had to name one problem only,
    what would it be?\n\nAnna\nCompetition – greater than before, need a better understanding\nDifferent
    landscape – audience that wants to be in person, some don’t like travel time. Who does virtual. Meeting
    virtual? Or reshape/reframe virtual offferings? Who is that audience?\nCompetency based.- content
    as a whole. Health, life... not jobs and what content they need for those jobs. What’s their skill set
    they need?\nIntentaion of CFAT was good, but never used/explained well. Has legs – should be looking
    into. Framing as competencies actuaries need. Naming convention\nUnderstanding/not – knowing who we
    serve and content we provide, who they are, what their needs are. Challenge – take our content, market
    as beginner, intermediate, without understanding who’s coming/who’s using it. How reinforcing.\nInternally,
    not clear direction, goals. Revenue? A lot of people? Think that everybody should be coming?\nReactionary
    approach – makes things fragmented, try to fix the reaction we have. No big picture, defined strategy.\
    \ \nXfunctional misalignment – international, separate PD... marketing... hard to reach the audience if
    not aligned with people working on the PD. Marketing – trying to reach the people that always come,
    or come occasionally. Don’t know what we do about reaching the people who never come. 33k members,
    a percent who pay their dues to have credential, and that’s it. Understanding who they are, where
    they get their learning/knowledge. \n\nTara – \nlots of content on everything – not the best in class
    in any particular area\nConfusion on target audiences, awareness issues,... how to reach nonmembers
   – especially for underwriting! – \nWe don’t know what content they want, especially for webcast. Not
    a lot of viewers – didn’t want or don’t know.\nRepeat speakers – fresh ideas/content. Honor to present
    instead of discount\nEmployers – valact – budgets tight – can’t register until July b/c of budget
    constraints.  Once every other year. Strong business case to go. Not strong business cases for each
    program.\n\n\nMegan\nCompeting within ourselves with everything we have\nEmployers with own content,
    reduced support to attend in person\nLogsitcis – fluctuating attendance – hard to contract future
    meetings, manage current ones\nClear direction not so clear. Changing direction is hard. Very reactionary.\n\
    Virtual attendance is down. Virtual conferencs –revenue – expense – looking at venues – where are
    we going? Boston/NY room rates/expenses high, but second tier cities. Depend who you talk to. Figure
    out the game plan. Goal – for a while, to do that. Saving money? Spending money? Pot of money vs member
    sat.\nInternational PD – lots being done. Sitting in the right spot, live within PD. \n\nMaja\nDowntrend
    in cert registrations\nLast 4 years, going down. Something look into and see – why?\nHuge international
    market. We are not getting a piece of those markets. Segmented. Attract international audiences. Who
    are they, how do we get to them? Who are the people who don’t buy (our members) and non-members? Nonmembers,
    how do they get info about the programs? How can we get more of those people?\nContent – keeping up
    the pace with the content updates and fresh content. PD E plus, a huge challenge. Have to have new
    things. Paying to get that... if pace isn’ tthere, not of value anymore. Percent being added, skip for
    a year then come back. Same for certificates. Pace of updating things... if want to offer new, something
    on AI, how are we updating that content that changes so rapidly? What is the speed of updates organizationally?
    Volunteers, agreement, getting them to agree, takes a long time. Need to update regularly. Can’t just
    wait anymore. Think/discuss/change minds, someone else will be there.\nContent – fresh ideas for content
    at conferences. If no fresh content, I’ve outgrown it. Doesn’t meet my needs. More/different. Still
    in field, needs not being met.\nValue – members looking at/reading market research. They want value;
    something they can say, this was a good use of my time. Program or offering met my needs. We can demonstrate
    that.\n- not sure we have a good understanding of the jobs/skills, needs. Job task analysis with education
   – was helpful, built curriculum based on that. Needs to be refreshed, relooked. Do those tasks shift?
    What are the new skills that are out tehre that we don’t know. go by the same large categoriesa nd
    subcategories. For the future, especially, what do es the future look like for actuaries. Do it now,
    here... but what’s the future for these people. With AI/everything else, should be \n\n\nVolunteer content
   – political, have to run content by them, first ones, experts... been hard\nIncorporate into PDC for
    discussions. Feel abandoned. Content was not the highest quality,a nd the same. Same presenters and
    content b/c structure was, w ewere getting content from the sections first. They were the first ones
    to submit content. Then open to broader audience. Then space.\nNot doing this anymore – call for sessions
    open to everyone, best sessions. Upset them. Meding relationship now.\n\nStrengthen buxinss skills,
    other skills\nBraoden analytical skills\nHighly ethical – political – is info correct? Great voice
    to say – not political, here is what is accurate. Changing frole of the actuary. Don’t like to do
    that, but now would bea. Great role for them. Voice of reason\nCertifying actuarial AI tools, insurance
    AI tools"
