- id: slide-14
  type: content
  title: 'Coherent Action: Set of coordinated activities that reinforce your competitive advantage'
  bullets:
  - '14'
  - 'Goal: Identify 3–5 mutually reinforcing actions that implement the guiding policy.'
  - Which actions will have the biggest impact on growth and sustainability?
  - How do these actions work together to support the policy?
  - Are we concentrating resources or spreading too thin?
  - Which actions should start immediately, and which can follow?
  - How will we measure success for each action?
