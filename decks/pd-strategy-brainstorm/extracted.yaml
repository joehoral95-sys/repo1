- id: slide-3
  type: content
  title: Meeting Background
  bullets:
  - '3'
  - 'Anna and I frequently have questions about the direction of Professional Development more broadly:'
  - Are we likely to change meetings other than ImpACT in the near future?
  - Should we keep virtual meetings?
  - How should we best serve international best?
  - What should we do with PD Edge Strategy?
  - Etc.
  - We wanted to bring this group together with your shared experience and perspectives to build a 
    skeleton of a strategic plan for PD.
  - We will validate what we discuss here at appropriate times with Financial plans, Market Research
    and/or other steps, but there is a lot of experience in this room that can represent key 
    elements of a strategic plan.
- id: slide-4
  type: content
  title: Meeting Approach
  bullets:
  - '4'
  - Inspired by Richard Rumelt’s Book “Good Strategy Bad Strategy” we will brainstorm the elements 
    and key points of a Diagnosis, Guiding Policy, and Coherent Action. Together, these form the 
    “kernel” of a strategy.
  - We anticipate this will get us a lot of the way forward to knowing what we know about the 
    direction, and knowing what we aren’t sure about or don’t know.
- id: slide-5
  type: content
  title: Housekeeping Notes
  bullets:
  - '5'
  - We will not get to final, beautiful, perfectly wordsmithed documents or plans today. We won’t 
    have “an answer” – likely, we will surface some agreement and some clear direction, and get 
    clearer on what questions still exist.
  - 'This is about getting the information on the table so we:'
  - know where we are
  - know what we know
  - hypothesize what we don’t know
  - understand perspectives
  - have good direction toward next steps
  - Candor and transparency are welcome
