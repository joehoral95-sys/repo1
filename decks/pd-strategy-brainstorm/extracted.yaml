- id: slide-10
  type: content
  title: KEY CONCLUSIONS OF THE DIAGNOSIS
  bullets:
  - 'We identify five interrelated challenges shaping PD and Meetings performance:'
  - Portfolio lacks clear market positioning and value differentiation
  - Intensifying competition across the PD marketplace
  - Offerings not consistently aligned to high-priority audience needs
  - Content acquisition and development process limits competitive edge
  - International growth is a core strategic lever with untapped potential
  - '10'
- id: slide-11
  type: content
  title: 'Guiding Policy: Making choices so you have a focused approach'
  bullets:
  - '11'
  - 'Goal: Establish the general approach that will address the diagnosis and focus our efforts.'
  - If we could only follow one overall approach, what would it be?
  - How do we leverage our strengths (brand, content, employer network) to win?
  - What boundaries should we set - what we will NOT pursue?
  - How will this policy differentiate SOA from competitors in the PD space?
  - Does this policy guide all PD formats (in-person, virtual, webinars, PD Edge)?
  notes: "We identify five interrelated challenges shaping PD and Meetings performance:\nPortfolio lacks
    clear market positioning and value differentiation\nIntensifying competition across the PD marketplace\n\
    Offerings not consistently aligned to high-priority audience needs\nContent acquisition and development
    process limits competitive edge\nInternational growth is a core strategic lever with untapped potential"
- id: slide-12
  type: content
  title: 'Guiding Policy: Making choices so you have a focused approach'
  bullets:
  - '12'
  - Design products for segments, not for “everyone”
  - Differentiate in-person events for premium/in-person/networking/differentiated content (ex 
    workshops, exec roundtables, etc)
  - Design virtual events as purpose-built experiences that will exceed the engagement of in-person 
    events en masse
  - Make PDE the year-round ”hub” for learning. AI? formats?
  - Build a sustainable content development/ management approach
  - PDC as ”editorial board”? PDLN as...?
  - Faster turns, volunteer role, blogs/communities, internal role, pay?
  - blog
  - Market research and test options for international to develop an international-specific 
    strategy.
  - What is online vs virtual? Local “meetings” vs larger events? Free events?
  - Bring in more external knowledge, understand different segments and their needs, evaluate 
    existing content, future focused; create a calendar of all PD – user friendly; design PD 
    offerings more engaging (webinars, PDE+) - more practical; create PD portfolio – all content 
    (research, international, etc)
  - Connect offerings to specific competencies and skills and then market to specific audience 
    segments
  - Survey international members on their PD needs and develop offerings based on those needs
  - Establish partnerships with employers and actuarial organizations in targeted geographic areas
  - Pursue quality and value to customers
  - Is a "mega event" the right answer? Specialized meetings is what the market research says they 
    like.
  - Partner with other actuarial organizations/competitors, co-locate in-person meetings cha
  - Differentiate virtual meeting from a webcast series. Or combine efforts
  - Inperson learning opportunities focused engaging formats – panels very limited
  - Re-design content development approach – CFP, Committees, PDC
  - Learn/ partner with competitors
  - Condense offerings based on needs of key audiences
  - Gain a better understanding of what we already do well, build on it, and find ways to expand – 
    workshops at ImpACT
