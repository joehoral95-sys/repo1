deck:
  title: "PD Strategy Brainstorm"
  audience: "PD strategy project team (Anna Abel, Maja Grgurovic, Megan Lanning, Alice Locatelli, Tara Read)"
  intent: "Facilitate a working session that builds the kernel of a PD strategy: diagnosis, guiding policy, coherent action"
  tone: "candid, working-session"
  date: "August 13, 2025"
  footer: "Society of Actuaries · PD Strategy Working Session"

slides:
  - id: cover
    type: title
    title: "Building the Kernel of a PD Strategy"
    subtitle: "A structured brainstorm: Diagnosis · Guiding Policy · Coherent Action"
    presenter: "Alice Locatelli, Managing Director, Experience"

  - id: agenda
    type: agenda
    title: "Today"
    items:
      - "Why we're here"
      - "Diagnosis — what's really happening"
      - "Guiding policy — the choices we make"
      - "Coherent action — what we actually do"
      - "Impact to products"
      - "Next steps"

  - id: why-here
    type: content
    title: "The questions keep coming up — today we face them together"
    kicker: "Meeting background"
    bullets:
      - "Will meetings beyond **ImpACT** change in the near future?"
      - "Should we keep **virtual meetings**?"
      - "How do we best serve **international** audiences?"
      - "What is the **PD Edge** strategy?"
    notes: >
      Anna and Alice frequently field these questions about PD direction.
      This group's shared experience can draft the skeleton of a strategic
      plan; we validate later with financial plans and market research.

  - id: ground-rules
    type: icon_row
    title: "Working session, not wordsmithing session"
    animate: build
    items:
      - icon: idea
        heading: "Get it on the table"
        text: "Know where we are, what we know, and what we only hypothesize."
      - icon: people
        heading: "All perspectives"
        text: "Candor and transparency are welcome — that's the point of this room."
      - icon: target
        heading: "Direction, not answers"
        text: "We leave with agreement, open questions, and clear next steps — not final documents."

  - id: sec-diagnosis
    type: section
    title: "Diagnosis"
    number: 1
    subtitle: "Ask “what's happening?” to understand the nature of the challenge."

  - id: diagnosis-goal
    type: quote
    text: "Agree on the single most critical challenge PD must solve over the next five years."
    attribution: "Goal of the diagnosis"
    notes: >
      Prompts: What is the biggest obstacle to doubling revenue and relevance?
      Which issues are symptoms vs. root problem? Where is PD most vulnerable —
      financially, competitively, operationally? What evidence supports the
      diagnosis? If we had to name ONE problem, what is it?

  - id: diagnosis-conclusions
    type: content
    title: "Five interrelated challenges shape PD performance"
    kicker: "Key conclusions of the diagnosis"
    animate: build
    bullets:
      - "Portfolio lacks clear **market positioning** and value differentiation"
      - "**Competition** across the PD marketplace is intensifying"
      - "Offerings aren't consistently aligned to **high-priority audience needs**"
      - "Content acquisition and development **limits our competitive edge**"
      - "**International growth** is a core lever with untapped potential"
    notes: >
      Raw brainstorm behind these: fewer actuaries = less PD; in-person vs
      virtual competition (including with ourselves); downward certificate
      registrations; unclear segmentation and target audiences; repeat
      speakers and slow content refresh; employer support declining;
      international events small-scale with questionable profitability;
      "lots of content on everything, best in nothing."

  - id: sec-policy
    type: section
    title: "Guiding Policy"
    number: 2
    subtitle: "Making choices so we have a focused approach."

  - id: policy-directions
    type: content
    title: "The emerging policy: choose segments, differentiate formats"
    kicker: "Where the room converged"
    animate: build
    bullets:
      - "Design products **for segments, not for everyone**"
      - "In-person events go **premium**: networking, workshops, exec roundtables"
      - "Virtual events become **purpose-built experiences**, not filmed meetings"
      - "**PD Edge as the year-round hub** for learning"
      - "Build a **sustainable content engine** — faster turns, clearer volunteer roles"
      - "Develop an **international-specific strategy** from research, not assumption"
    notes: >
      Additional threads: partner/co-locate with other actuarial organizations;
      badge strategy (LinkedIn-visible credentials with metadata); connect
      offerings to competencies then market by segment; a single user-friendly
      calendar of all PD; pull education and research content into PD.

  - id: sec-action
    type: section
    title: "Coherent Action"
    number: 3
    subtitle: "Coordinated activities that reinforce our advantage."

  - id: action-goal
    type: content
    title: "Pick 3-5 actions that reinforce each other — then concentrate"
    kicker: "Goal of this block"
    bullets:
      - "Which actions have the **biggest impact** on growth and sustainability?"
      - "How do the actions **work together** to support the policy?"
      - "Are we **concentrating** resources or spreading thin?"
      - "What starts **immediately**, what follows?"
      - "How will we **measure success** for each?"

  - id: impact-products
    type: content
    title: "The strategy must change what we keep, change, and retire"
    kicker: "Impact to products"
    bullets:
      - "Score every format against the policy: in-person, virtual, webinars, PD Edge"
      - "Adjust **pricing, packaging, delivery** where the role changes"
      - "**Retire** products that no longer fit or can't meet margin targets"
      - "Spot the new offerings the policy unlocks — cohorts, micro-credentials, employer academies"
    notes: >
      Underserved segments named in session: small firms, Tier 2/3 countries,
      mid-career actuaries. Accept deliberate cannibalization where margin
      and reach improve.

  - id: next-steps
    type: timeline
    title: "From brainstorm to strategy"
    kicker: "Next steps"
    milestones:
      - {label: "Formalize & communicate", done: false}
      - {label: "Translate into initiatives", done: false}
      - {label: "Assign ownership", done: false}
      - {label: "5-year roadmap + financial model", done: false}
      - {label: "Metrics, milestones, review cadence", done: false}

  - id: close
    type: thanks
    title: "Thank you"
    message: "Session notes and the raw brainstorm are preserved in the speaker notes of this deck."
    contact: "Alice Locatelli · Managing Director, Experience"
