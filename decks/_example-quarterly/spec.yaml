# The shipped worked example — also the CI golden deck.
# Exercises every slide type the engine supports.
deck:
  title: "Q2 2026 Membership & Exam Update"
  audience: "SOA Board of Directors"
  intent: "Reassure on membership trend; get sign-off on the exam-fee proposal"
  tone: "confident, data-forward"
  date: "July 2026"
  footer: "Society of Actuaries · Board Meeting · July 2026"
  animations: subtle

slides:
  - id: cover
    type: title
    title: "Membership Momentum, Exam Headwinds"
    subtitle: "Q2 2026 Update for the Board"
    presenter: "Prepared by the CEO's Office"

  - id: agenda
    type: agenda
    title: "Today"
    items:
      - "Membership trend"
      - "Exam volumes"
      - "Fee proposal"
      - "Decision needed"

  - id: sec-membership
    type: section
    title: "Membership"
    number: 1
    subtitle: "The longest growth streak since 2019"

  - id: membership-kpis
    type: big_number
    title: "Membership grew for the 6th straight quarter"
    animate: build
    stats:
      - value: "33,412"
        label: "Total members"
        delta: "+2.1% vs Q1"
        arrow: up
        sentiment: good
      - value: "1,204"
        label: "New FSAs YTD"
        delta: "+9% vs 2025 pace"
        arrow: up
        sentiment: good
      - value: "4.3%"
        label: "Lapse rate"
        delta: "-0.4 pts"
        arrow: down
        sentiment: good
    notes: >
      Emphasize this is the longest growth streak since 2019. If asked about
      drivers: international candidates and the new associate pathway.

  - id: exam-trend
    type: chart
    title: "Exam sittings dipped — but only in prelims"
    animate: fade
    chart:
      kind: bar_clustered
      categories: ["Q3 25", "Q4 25", "Q1 26", "Q2 26"]
      series:
        - name: "Preliminary exams"
          values: [8120, 8340, 7980, 7410]
        - name: "Fellowship exams"
          values: [2210, 2190, 2260, 2300]
      highlight: {series: "Preliminary exams", point: 3}
      number_format: "#,##0"
    insight: "Fellowship demand is stable — the dip is an entry-pipeline issue, not retention."
    source: "SOA exam registration system, 2026-06-30"
    notes: "If asked: prelim dip correlates with the university calendar shift."

  - id: pipeline-mix
    type: chart
    title: "Two-thirds of new candidates now come through universities"
    chart:
      kind: doughnut
      categories: ["University programs", "Employer-sponsored", "Independent"]
      series:
        - name: "Candidates"
          values: [66, 24, 10]
    insight: "Our university partnerships are now the front door — protect them."

  - id: exam-detail
    type: table
    title: "Prelim volumes by exam: P and FM carry the dip"
    columns: ["Exam", "Q1 26", "Q2 26", "Change"]
    rows:
      - ["Exam P",   "2,410", "2,180", "-9.5%"]
      - ["Exam FM",  "2,205", "1,990", "-9.8%"]
      - ["Exam FAM", "1,830", "1,780", "-2.7%"]
      - ["Exam ALTAM", "790", "775",   "-1.9%"]
    emphasize_col: 3

  - id: sec-proposal
    type: section
    title: "The fee proposal"
    number: 2

  - id: why-now
    type: icon_row
    title: "Three pressures make this the right moment"
    animate: build
    items:
      - heading: "Proctoring costs"
        text: "Vendor costs up 12% since 2024; current fees no longer cover delivery."
      - heading: "Peer benchmark"
        text: "Our exam fees sit 8-15% below comparable credentialing bodies."
      - heading: "Member value"
        text: "Revenue funds the new digital study platform members asked for."

  - id: fee-comparison
    type: comparison
    title: "Two paths on exam fees"
    left:
      heading: "Hold fees flat"
      bullets:
        - "No candidate friction"
        - "**-$1.2M** vs plan in 2027"
        - "Revisit under pressure in Q4"
    right:
      heading: "Raise 4% (recommended)"
      bullets:
        - "Covers proctoring cost growth"
        - "Still below peer bodies"
        - "**+$0.9M** to plan, funds study platform"
    emphasize: right

  - id: rollout
    type: timeline
    title: "Approval today puts new fees in place for the spring sitting"
    milestones:
      - {label: "Board approval", date: "Jul 2026", done: false}
      - {label: "Member communication", date: "Sep 2026", done: false}
      - {label: "Registration opens", date: "Nov 2026", done: false}
      - {label: "New fees effective", date: "Jan 2027", done: false}

  - id: ask
    type: quote
    text: "We ask the Board to approve the 4% exam-fee adjustment effective January 2027."
    attribution: "Decision requested today"

  - id: close
    type: thanks
    title: "Thank you"
    message: "Full financial model and sensitivity analysis available in the appendix pack."
    contact: "questions@soa.org"
